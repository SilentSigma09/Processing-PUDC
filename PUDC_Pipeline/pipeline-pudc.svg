<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="980" viewBox="0 0 2600 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .page { fill: #050505; }
      .phase { fill: #444746; stroke: #6b7280; stroke-width: 1.4; }
      .phase-title { font: 700 13px Arial, sans-serif; fill: #f3f4f6; }
      .phase-subtitle { font: 400 10px Arial, sans-serif; fill: #d1d5db; }
      .source-title { font: 700 11px Arial, sans-serif; fill: #e5e7eb; }
      .node-blue { fill: #d8ecff; stroke: #88bde8; stroke-width: 1.3; }
      .node-green { fill: #dff7dd; stroke: #9ad28f; stroke-width: 1.3; }
      .node-purple { fill: #edd8ff; stroke: #c084fc; stroke-width: 1.3; }
      .node-orange { fill: #fff4df; stroke: #fb923c; stroke-width: 2; }
      .node-dark { fill: #24333a; stroke: #4b6470; stroke-width: 1.2; }
      .node-text { font: 700 10.5px Arial, sans-serif; fill: #0f172a; }
      .node-text-small { font: 400 9.5px Arial, sans-serif; fill: #1f2937; }
      .dark-text { font: 700 10px Arial, sans-serif; fill: #dbeafe; }
      .dark-small { font: 400 9px Arial, sans-serif; fill: #cbd5e1; }
      .edge { fill: none; stroke: #9ca3af; stroke-width: 1.25; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #6b7280; stroke-width: 1; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #6b7280; stroke-width: 0.8; }
      .branch { font: 400 9.5px Arial, sans-serif; fill: #e5e7eb; }
      .repo-line { fill: none; stroke: #6b7280; stroke-width: 1; }
      .main-title { font: 700 18px Arial, sans-serif; fill: #f9fafb; }
      .caption { font: 400 11px Arial, sans-serif; fill: #d1d5db; }
    </style>
  </defs>

  <rect class="page" width="2600" height="980"/>
  <text class="main-title" x="22" y="28">Pipeline de traitement PUDC - architecture data</text>
  <text class="caption" x="22" y="48">Workflow horizontal : phases grises, sources cylindriques, traitements bleus, bases cylindriques violettes, controles orange.</text>

  <!-- ===================== PHASE 1 ===================== -->
  <rect class="phase" x="8" y="70" width="620" height="560" rx="0"/>
  <text class="phase-title" x="286" y="91">1. Sources + ETL Stata</text>
  <text class="phase-subtitle" x="288" y="106">Extraction - transformation - chargement</text>

  <text class="source-title" x="58" y="92">Sources de donnees</text>
  <g filter="url(#softShadow)">
    <path class="node-green" d="M58 115 C58 105 138 105 138 115 L138 166 C138 176 58 176 58 166 Z"/>
    <ellipse class="node-green" cx="98" cy="115" rx="40" ry="10"/>
    <text class="node-text" x="75" y="136">Menage</text>
    <text class="node-text-small" x="70" y="151">PUDC.dta</text>

    <path class="node-green" d="M58 207 C58 197 138 197 138 207 L138 258 C138 268 58 268 58 258 Z"/>
    <ellipse class="node-green" cx="98" cy="207" rx="40" ry="10"/>
    <text class="node-text" x="74" y="228">Individus</text>
    <text class="node-text-small" x="55" y="243">S1_INFOS_MEMBRES</text>

    <path class="node-green" d="M178 161 C178 151 258 151 258 161 L258 212 C258 222 178 222 178 212 Z"/>
    <ellipse class="node-green" cx="218" cy="161" rx="40" ry="10"/>
    <text class="node-text" x="190" y="182">Modules</text>
    <text class="node-text-small" x="188" y="197">S3/S4/S5/S7</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="node-blue" x="320" y="155" width="95" height="45"/>
    <text class="node-text" x="342" y="175">Import</text>
    <text class="node-text-small" x="332" y="190">read_dta()</text>

    <rect class="node-blue" x="470" y="155" width="112" height="45"/>
    <text class="node-text" x="489" y="175">data/input</text>
    <text class="node-text-small" x="482" y="190">copie de travail</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="node-dark" x="136" y="348" width="116" height="48"/>
    <text class="dark-text" x="165" y="369">Git repo</text>
    <text class="dark-small" x="151" y="384">Scripts + docs</text>
  </g>
  <g filter="url(#softShadow)">
    <rect class="node-dark" x="23" y="482" width="122" height="54"/>
    <text class="dark-text" x="45" y="503">run_all.R</text>
    <text class="dark-small" x="34" y="518">orchestrateur</text>
  </g>

  <!-- ===================== PHASE 2 ===================== -->
  <rect class="phase" x="642" y="155" width="612" height="300" rx="0"/>
  <text class="phase-title" x="845" y="176">2. Dictionnaires &amp; mapping</text>
  <text class="phase-subtitle" x="855" y="191">Approche metadata-driven</text>

  <g filter="url(#softShadow)">
    <rect class="node-blue" x="680" y="242" width="130" height="48"/>
    <text class="node-text" x="700" y="263">Extraction</text>
    <text class="node-text-small" x="694" y="278">dictionnaires init</text>

    <rect class="node-blue" x="865" y="242" width="130" height="48"/>
    <text class="node-text" x="884" y="263">Prefill</text>
    <text class="node-text-small" x="881" y="278">labels + modalities</text>

    <polygon class="node-orange" points="1075,232 1130,266 1075,300 1020,266"/>
    <text class="node-text" x="1049" y="263">Mapping</text>
    <text class="node-text-small" x="1047" y="278">valide ?</text>

    <path class="node-purple" d="M1148 240 C1148 230 1232 230 1232 240 L1232 292 C1232 302 1148 302 1148 292 Z"/>
    <ellipse class="node-purple" cx="1190" cy="240" rx="42" ry="10"/>
    <text class="node-text" x="1160" y="263">Dictionnaires</text>
    <text class="node-text-small" x="1162" y="278">filled + mapping</text>
  </g>

  <!-- ===================== PHASE 3 ===================== -->
  <rect class="phase" x="1270" y="215" width="560" height="620" rx="0"/>
  <text class="phase-title" x="1356" y="236">3. Nettoyage metier</text>
  <text class="phase-subtitle" x="1366" y="251">Menages &amp; individus</text>

