    <ellipse class="node-purple" cx="2163" cy="397" rx="42" ry="10"/>
    <text class="node-text" x="2100" y="419">Bases finales</text>
    <text class="node-text-small" x="2103" y="437">CSV propres</text>

    <!-- NOUVEAU : Agregation chocs -->
    <rect class="node-blue" x="1879" y="500" width="175" height="66"/>
    <text class="node-text" x="1896" y="524">Agregation chocs</text>
    <text class="node-text-small" x="1896" y="542">nb_chocs (S7_INFOS</text>
    <text class="node-text-small" x="1896" y="557">_CHOCS_renamed)</text>
  </g>

  <!-- ===================== PHASE 5 ===================== -->
  <rect class="phase" x="2266" y="300" width="326" height="620" rx="0"/>
  <text class="phase-title" x="2340" y="321">5. QAQC &amp; production</text>
  <text class="phase-subtitle" x="2355" y="336">Restitution finale</text>

  <g filter="url(#softShadow)">
    <rect class="node-blue" x="2302" y="385" width="118" height="48"/>
    <text class="node-text" x="2333" y="406">QAQC</text>
    <text class="node-text-small" x="2316" y="421">Rmd + cartes</text>

    <rect class="node-blue" x="2457" y="385" width="118" height="48"/>
    <text class="node-text" x="2482" y="406">Exports</text>
    <text class="node-text-small" x="2470" y="421">html / docx / txt</text>

    <path class="node-purple" d="M2300 470 C2300 460 2460 460 2460 470 L2460 536 C2460 546 2300 546 2300 536 Z"/>
    <ellipse class="node-purple" cx="2380" cy="470" rx="60" ry="13"/>
    <text class="node-text" x="2350" y="495">Livrables</text>
    <text class="node-text-small" x="2328" y="512">Menages / Individus</text>
    <text class="node-text-small" x="2343" y="526">QAQC report</text>

    <!-- NOUVEAU : Shapefile GADM (entree cartes) -->
    <path class="node-green" d="M2302 580 C2302 570 2466 570 2466 580 L2466 642 C2466 652 2302 652 2302 642 Z"/>
    <ellipse class="node-green" cx="2366" cy="580" rx="40" ry="10"/>
