    <text class="node-text-small" x="1510" y="600">qa_asset_diag.csv</text>
    <text class="node-text-small" x="1510" y="616">qa_actifs_raw.rds</text>
  </g>

  <!-- ===================== PHASE 4 ===================== -->
  <rect class="phase" x="1842" y="215" width="410" height="620" rx="0"/>
  <text class="phase-title" x="1930" y="236">4. Fusion &amp; validation</text>
  <text class="phase-subtitle" x="1937" y="251">Controle d'integrite</text>

  <g filter="url(#softShadow)">
