    <rect class="node-blue" x="1376" y="390" width="124" height="48"/>
    <text class="node-text" x="1397" y="411">Indicateurs</text>
    <text class="node-text-small" x="1382" y="426">eau, nutrition</text>

    <!-- NOUVEAU : Imputation MICE + ACP richesse -->
    <rect class="node-blue" x="1305" y="475" width="178" height="84"/>
    <text class="node-text" x="1322" y="498">Imputation MICE</text>
    <text class="node-text-small" x="1322" y="516">mice() logreg m=5</text>
    <text class="node-text-small" x="1322" y="533">score_actifs -&gt;</text>
    <text class="node-text-small" x="1322" y="550">index_richesse_pca</text>
    <text class="node-text-small" x="1322" y="564">+ quintile_richesse</text>

    <!-- NOUVEAU : Diagnostics actifs (sortie QAQC) -->
    <path class="node-purple" d="M1500 560 C1500 550 1672 550 1672 560 L1672 626 C1672 636 1500 636 1500 626 Z"/>
    <ellipse class="node-purple" cx="1596" cy="560" rx="42" ry="10"/>
